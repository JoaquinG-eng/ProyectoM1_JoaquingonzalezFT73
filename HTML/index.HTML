<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de colores</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <main class="app">
        <h1>Paleta de colores</h1>
        <p class="descripcion">Selecciona colores con nombre y código para tu proyecto.</p>

        <section class="paleta" id="paleta"></section>

        <div class="actions">
            <div class="control-size">
                <label for="sizeSelect">Tamaño:</label>
                <select id="sizeSelect" aria-label="Selecciona cuantos colores">
                    <option value="6" selected>6 colores</option>
                    <option value="8">8 colores</option>
                    <option value="9">9 colores</option>
                </select>
            </div>
            <button id="generarBtn" class="modern-btn">Generar nueva paleta</button>
            <button id="copiarBtn" class="modern-btn secondary">Copiar códigos</button>
        </div>

        <p id="mensaje" class="mensaje" aria-live="polite"></p>
    </main>

    <script>
        const colores = [
            {nombre: 'Azul cielo', codigo:'#3498db'},
            {nombre: 'Verde menta', codigo:'#2ecc71'},
            {nombre: 'Amarillo sol', codigo:'#f1c40f'},
            {nombre: 'Rojo coral', codigo:'#e74c3c'},
            {nombre: 'Morado fresco', codigo:'#9b59b6'},
            {nombre: 'Gris piedra', codigo:'#95a5a6'},
            {nombre: 'Naranja vivo', codigo:'#e67e22'},
            {nombre: 'Turquesa', codigo:'#1abc9c'},
            {nombre: 'Cian oscuro', codigo:'#16a085'},
            {nombre: 'Púrpura', codigo:'#8e44ad'}
        ];

        const paleta = document.getElementById('paleta');
        const sizeSelect = document.getElementById('sizeSelect');
        const generarBtn = document.getElementById('generarBtn');
        const copiarBtn = document.getElementById('copiarBtn');
        const mensaje = document.getElementById('mensaje');

        let paletaState = [];
        let blockedSet = new Set();

        function randomHex() {
            return '#' + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, '0');
        }

        function showToast(texto) {
            mensaje.textContent = texto;
            setTimeout(() => { if (mensaje.textContent === texto) mensaje.textContent = ''; }, 1400);
        }

        function mezclar(array) {
            return array
                .map(a => ({ sort: Math.random(), value: a }))
                .sort((a,b) => a.sort - b.sort)
                .map(a => a.value);
        }

        function renderizarPaleta() {
            paleta.innerHTML = '';
            paletaState.forEach((item, index) => {
                const card = document.createElement('article');
                card.className = 'color-card' + (item.locked ? ' locked' : '');
                card.style.setProperty('--color', item.codigo);

                card.innerHTML = `
                    <div class="muestra"></div>
                    <div class="datos">
                        <h2>${item.nombre}</h2>
                        <p>${item.codigo}</p>
                        <button type="button" class="lock-btn" aria-pressed="${item.locked}">${item.locked ? '🔒 Bloqueado' : '🔓 Bloquear'}</button>
                    </div>
                `;

                const lockBtn = card.querySelector('.lock-btn');
                lockBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    paletaState[index].locked = !paletaState[index].locked;
                    if (paletaState[index].locked) {
                        blockedSet.add(item.codigo);
                    } else {
                        blockedSet.delete(item.codigo);
                    }
                    renderizarPaleta();
                    showToast(paletaState[index].locked ? `Color ${item.codigo} bloqueado` : `Color ${item.codigo} desbloqueado`);
                });

                const muestra = card.querySelector('.muestra');
                muestra.addEventListener('click', () => {
                    navigator.clipboard.writeText(item.codigo)
                        .then(() => showToast(`Copiado ${item.codigo}`))
                        .catch(() => showToast('No se pudo copiar.'));
                });

                paleta.appendChild(card);
            });
        }

        function crearPaletaAleatoria() {
            const size = Number(sizeSelect.value);
            const colorPool = mezclar(colores);

            // Mantener los bloqueados
            const lockedList = paletaState.filter(c => c.locked);
            const lockedSetInUse = new Set(lockedList.map(c => c.codigo));

            // Construir nueva paleta: bloqueados primero
            const nuevaPaleta = [...lockedList];
            for (const item of colorPool) {
                if (nuevaPaleta.length >= size) break;
                if (!lockedSetInUse.has(item.codigo)) {
                    nuevaPaleta.push({ ...item, locked: false });
                }
            }

            paletaState = nuevaPaleta;
            renderizarPaleta();
            showToast('Paleta aleatoria lista.');
        }

        function copiarCodigos() {
            const todosCodigos = paletaState.map(c => c.codigo);
            const bloqueados = paletaState.filter(c => c.locked).map(c => c.codigo);

            const textoBloqueados = bloqueados.length > 0
                ? `Bloqueados (${bloqueados.length}): ${bloqueados.join(', ')}`
                : 'Bloqueados (0): ninguno';

            const textoTotal = `Todos (${todosCodigos.length}): ${todosCodigos.join(', ')}`;
            const clipboardText = `${textoBloqueados}\n${textoTotal}`;

            navigator.clipboard.writeText(clipboardText)
                .then(() => showToast('Códigos copiados al portapapeles para bloqueados y paleta completa.'))
                .catch(() => showToast('No se pudo copiar, usa Ctrl+C.'));
        }

        generarBtn.addEventListener('click', crearPaletaAleatoria);
        copiarBtn.addEventListener('click', copiarCodigos);

        crearPaletaAleatoria();
    </script>
</body>
</html>
